  - date: '2026-06-03'
    rating: 2
    summary: >-
      Kyushu University has no central developer portal. The one verifiable public
      API is the Kyushu University Library's QIR institutional repository OAI-PMH
      2.0 endpoint, which returned a valid Identify response (JPCOAR schema,
      protocolVersion 2.0, adminEmail qir@jimu.kyushu-u.ac.jp). The library also
      documents quarterly bulk TSV metadata exports via the Handle system. The
      Elsevier Pure research portal and the Academic Staff researcher database are
      public for browsing but document no open API. A legacy DSpace OAI endpoint
      (qir.kyushu-u.ac.jp/dspace-oai) no longer resolves — it has migrated to the
      catalog.lib.kyushu-u.ac.jp WEKO-based system. No fabricated endpoints; only
      live-verified URLs are cataloged.
    endpoints:
