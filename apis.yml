---
aid: kyushu
name: Kyushu University
description: >-
  Kyushu University (九州大学) is a national research university in Fukuoka, Japan,
  ranked #167 in the QS World University Rankings 2025. Its public, programmatic
  footprint is concentrated in the university library, which operates the Kyushu
  University Institutional Repository (QIR) and exposes scholarly metadata over a
  live OAI-PMH 2.0 interface using the JPCOAR schema, alongside quarterly bulk TSV
  downloads via the Handle system. Other institutional surfaces — the Elsevier Pure
  research portal and the Academic Staff researcher database — are public for
  browsing but do not document an open API. There is no central institution-wide
  developer portal; this profile catalogs only the endpoints that could be verified
  live.
