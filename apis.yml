        url: https://www.lib.kyushu-u.ac.jp/ja/metadata
      - type: OpenAPI
        url: https://catalog.lib.kyushu-u.ac.jp/mmd/mmd_api/oai-pmh/?verb=Identify
  - aid: kyushu:qir-bulk-tsv
    name: QIR / Kyushu University Collections Bulk Metadata (TSV via Handle)
    description: >-
      Quarterly full-metadata TSV exports for Kyushu University Library digital
      collections, distributed through the Handle system. Covers the institutional
      repository (QIR) as well as rare materials, seal images and coal images
      collections. Provided as bulk downloads rather than a query API.
    humanURL: https://www.lib.kyushu-u.ac.jp/ja/metadata
    tags: [ Bulk Download, Metadata, TSV, Handle, Library, Open Data ]
    properties:
