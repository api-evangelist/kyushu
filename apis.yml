apis:
  - aid: kyushu:qir-oai-pmh
    name: Kyushu University Institutional Repository (QIR) OAI-PMH
    description: >-
      Live OAI-PMH 2.0 metadata harvesting interface for the Kyushu University
      Institutional Repository (QIR), run by the Kyushu University Library. Returns
      scholarly metadata in the JPCOAR schema (metadataPrefix=jpcoar). Supports
      Identify, GetRecord and ListRecords (max 500 records per request, with
      resumptionToken pagination) and from/until date filtering. Verified live:
      the Identify verb returns repositoryName "Kyushu University Institutional
      Repository (QIR)", protocolVersion 2.0, granularity to seconds, and
      adminEmail qir@jimu.kyushu-u.ac.jp.
    humanURL: https://www.lib.kyushu-u.ac.jp/ja/metadata
    baseURL: https://catalog.lib.kyushu-u.ac.jp/mmd/mmd_api/oai-pmh/
    tags: [ OAI-PMH, Institutional Repository, Metadata, JPCOAR, Open Access, Library, Research ]
    properties:
